name: Build

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    name: Gradle build
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build and test
        run: ./gradlew build
